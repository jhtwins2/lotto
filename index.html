<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="로또">
<title>로또 번호 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;color:#fff;font-family:'Noto Sans KR',sans-serif;min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;user-select:none;}

.header{padding:16px 20px 8px;text-align:center;}
.header-sub{font-size:10px;color:#555;letter-spacing:0.12em;margin-bottom:4px;}
.header-title{font-size:20px;font-weight:700;color:#fff;}

/* 제외 숫자 그리드 */
.section{margin:0 14px 12px;}
.section-label{font-size:11px;color:#888;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.exclude-count{color:#ef4444;}

.num-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;}
.num-btn{
  aspect-ratio:1;border-radius:7px;background:#1e1e1e;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#aaa;font-weight:500;
  cursor:pointer;transition:all 0.12s;border:1.5px solid transparent;
}
.num-btn:active{transform:scale(0.9);}
.num-btn.excluded{background:#7f1d1d;border-color:#ef4444;color:#ef4444;}
.num-btn.disabled-btn{opacity:0.35;pointer-events:none;}

/* 번호 결과 */
.results{margin:0 14px 10px;}
.result-row{
  background:#1a1a1a;border-radius:10px;
  padding:9px 12px;margin-bottom:5px;
  display:flex;align-items:center;gap:8px;
}
.result-label{font-size:11px;color:#555;min-width:14px;font-weight:500;}
.balls{display:flex;gap:5px;}
.ball{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
/* 공식 동행복권 색상 */
.b-y{background:#f7c200;color:#5a4200;}  /* 1~10 노랑 */
.b-b{background:#326ddc;color:#d6e4ff;}  /* 11~20 파랑 */
.b-r{background:#e63328;color:#ffd6d6;}  /* 21~30 빨강 */
.b-g{background:#888888;color:#f0f0f0;}  /* 31~40 회색 */
.b-gr{background:#16a34a;color:#d1fae5;} /* 41~45 초록 */

/* 빈 상태 */
.empty-balls{display:flex;gap:5px;}
.ball-empty{
  width:30px;height:30px;border-radius:50%;
  background:#2a2a2a;border:1.5px dashed #333;
}

/* 버튼 */
.btn-row{margin:0 14px 14px;display:flex;gap:8px;}
.btn-gen{
  flex:1;padding:15px;background:#16a34a;
  border:none;border-radius:13px;
  font-size:15px;font-weight:700;color:#fff;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;transition:all 0.15s;
}
.btn-gen:active{transform:scale(0.97);background:#15803d;}
.btn-reset{
  width:52px;background:#1a1a1a;border:1px solid #2e2e2e;
  border-radius:13px;font-size:20px;color:#666;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.btn-reset:active{transform:scale(0.95);}

/* 색상 범례 */
.legend{display:flex;flex-wrap:wrap;gap:6px 10px;margin:0 14px 12px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#666;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* 토스트 */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1e1e1e;border:1px solid #333;
  color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:all 0.3s;
  white-space:nowrap;z-index:100;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 에러 메시지 */
.error-msg{
  font-size:11px;color:#ef4444;
  text-align:center;padding:4px;
  display:none;
}
.error-msg.show{display:block;}
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">동행복권</div>
  <div class="header-title">로또 번호 생성기</div>
</div>

<!-- 색상 범례 -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f7c200;"></div>1~10</div>
  <div class="legend-item"><div class="legend-dot" style="background:#326ddc;"></div>11~20</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e63328;"></div>21~30</div>
  <div class="legend-item"><div class="legend-dot" style="background:#888;"></div>31~40</div>
  <div class="legend-item"><div class="legend-dot" style="background:#16a34a;"></div>41~45</div>
</div>

<!-- 제외 숫자 선택 -->
<div class="section">
  <div class="section-label">
    <span>제외할 숫자 <span style="color:#555;">(탭하면 제외, 다시 탭하면 해제)</span></span>
    <span class="exclude-count" id="excludeCount"></span>
  </div>
  <div class="num-grid" id="numGrid"></div>
  <div class="error-msg" id="errorMsg">⚠️ 최대 39개까지만 제외할 수 있어요</div>
</div>

<!-- 생성 결과 -->
<div class="results" id="results">
  <!-- JS로 렌더링 -->
</div>

<!-- 버튼 -->
<div class="btn-row">
  <button class="btn-gen" id="btnGen" onclick="generate()">🎱 번호 생성</button>
  <button class="btn-reset" onclick="resetAll()" title="초기화">↺</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 공식 동행복권 색상 ──────────────────────────
function ballClass(n) {
  if (n <= 10) return 'b-y';
  if (n <= 20) return 'b-b';
  if (n <= 30) return 'b-r';
  if (n <= 40) return 'b-g';
  return 'b-gr';
}

// ── 상태 ──────────────────────────────────────
const excluded = new Set();
const MAX_EXCLUDE = 39; // 최소 6개 남겨야 하므로 45-6=39

// ── 숫자 그리드 생성 ──────────────────────────
function buildGrid() {
  const grid = document.getElementById('numGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 45; i++) {
    const btn = document.createElement('div');
    btn.className = 'num-btn' + (excluded.has(i) ? ' excluded' : '');
    btn.textContent = i;
    btn.dataset.n = i;
    btn.addEventListener('click', () => toggleExclude(i));
    grid.appendChild(btn);
  }
  updateExcludeCount();
}

function toggleExclude(n) {
  const errorMsg = document.getElementById('errorMsg');
  if (excluded.has(n)) {
    excluded.delete(n);
    errorMsg.classList.remove('show');
  } else {
    // 방어 로직: 39개 초과 불가
    if (excluded.size >= MAX_EXCLUDE) {
      errorMsg.classList.add('show');
      showToast('최대 39개까지만 제외할 수 있어요');
      return;
    }
    excluded.add(n);
  }
  buildGrid();
}

function updateExcludeCount() {
  const el = document.getElementById('excludeCount');
  if (excluded.size > 0) {
    el.textContent = `제외 ${excluded.size}개`;
  } else {
    el.textContent = '';
  }
}

// ── 번호 생성 ──────────────────────────────────
function generate() {
  const pool = [];
  for (let i = 1; i <= 45; i++) {
    if (!excluded.has(i)) pool.push(i);
  }

  // 방어 로직: 혹시라도 6개 미만이면 차단
  if (pool.length < 6) {
    showToast('제외 숫자가 너무 많아요!');
    return;
  }

  const labels = ['A', 'B', 'C', 'D', 'E'];
  const sets = [];

  for (let s = 0; s < 5; s++) {
    const tmp = [...pool];
    const pick = [];
    for (let i = 0; i < 6; i++) {
      const idx = Math.floor(Math.random() * tmp.length);
      pick.push(tmp.splice(idx, 1)[0]);
    }
    pick.sort((a, b) => a - b);
    sets.push(pick);
  }

  renderResults(sets, labels);
  showToast('5줄 생성 완료!');
}

function renderResults(sets, labels) {
  const container = document.getElementById('results');
  container.innerHTML = sets.map((row, i) => `
    <div class="result-row">
      <span class="result-label">${labels[i]}</span>
      <div class="balls">
        ${row.map(n => `<div class="ball ${ballClass(n)}">${n}</div>`).join('')}
      </div>
    </div>
  `).join('');
}

function renderEmpty() {
  const container = document.getElementById('results');
  const labels = ['A', 'B', 'C', 'D', 'E'];
  container.innerHTML = labels.map(l => `
    <div class="result-row">
      <span class="result-label">${l}</span>
      <div class="empty-balls">
        ${Array(6).fill('<div class="ball-empty"></div>').join('')}
      </div>
    </div>
  `).join('');
}

// ── 초기화 ────────────────────────────────────
function resetAll() {
  excluded.clear();
  document.getElementById('errorMsg').classList.remove('show');
  buildGrid();
  renderEmpty();
  showToast('초기화됐어요');
}

// ── 토스트 ────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── 초기 실행 ─────────────────────────────────
buildGrid();
renderEmpty();
</script>
</body>
</html>
